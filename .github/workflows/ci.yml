name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.9.1

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2.83.0
        with:
          tool: cargo-deny@0.19.9
          fallback: none

      - name: Check dependencies
        run: cargo deny check

  coverage:
    name: Test coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2.83.0
        with:
          tool: cargo-llvm-cov@0.8.7
          fallback: none

      - name: Measure coverage
        run: |
          mkdir -p target/llvm-cov
          cargo llvm-cov --locked --all-targets --lcov --output-path target/llvm-cov/lcov.info
          cargo llvm-cov report --locked --json --summary-only --output-path target/llvm-cov/summary.json

      - name: Write coverage badge
        run: |
          mkdir -p .github/badges
          coverage="$(jq -r '.data[0].totals.lines.percent' target/llvm-cov/summary.json)"
          coverage="$(printf "%.1f%%" "$coverage")"
          jq -n \
            --arg coverage "$coverage" \
            '{coverage: $coverage}' \
            > .github/badges/coverage.json
          cat .github/badges/coverage.json

      - name: Upload coverage report
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-lcov
          path: target/llvm-cov/lcov.info
          if-no-files-found: error

      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- .github/badges/coverage.json; then
            echo "Coverage badge is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.json
          git commit -m "📈 ci: update coverage badge [skip ci]"
          git push origin HEAD:main
